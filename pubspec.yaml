name: research_assistant
description: AI-powered research paper search, summarization, and chat.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Dependency injection
  get_it: ^7.7.0

  # Network
  dio: ^5.7.0

  # XML parsing (arXiv Atom feeds)
  xml: ^6.5.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Functional error handling
  dartz: ^0.10.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  file_picker: ^8.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7


flutter:
  uses-material-design: true
